// Types treated as stable by the Compose compiler.
// These standard collections are read-only interfaces in our code (UI state never mutates them
// in place), so treating them as stable is safe and avoids runtime stability checks.
kotlin.collections.List
kotlin.collections.Set
kotlin.collections.Map

// StateFlow is an observable holder we only ever read/collect from in composables; safe to treat
// as stable so flow params don't fall back to runtime stability checks.
kotlinx.coroutines.flow.StateFlow
