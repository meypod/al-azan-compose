name: build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: build bundle
      if: ${{ github.event_name == 'release' }}
      run: ./gradlew --no-daemon :app:bundleRelease --stacktrace

    - name: build apk
      run: ./gradlew --no-daemon :app:assembleRelease --stacktrace

    - name: Rename apk
      working-directory: app/build/outputs/apk/release
      run: |
        set -euo pipefail
        meta=output-metadata.json
        vn=$(jq -er '.elements[0].versionName' "$meta")
        vc=$(jq -er '.elements[0].versionCode' "$meta")
        src=$(jq -er '.elements[0].outputFile' "$meta")
        dst="al-azan--release-${vn}-universal-${vc}.apk"
        mv "$src" "$dst"
        test -f "$dst"
        echo "renamed $src -> $dst"

    - name: Sign App Apk
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "36.0.0"

    - name: Sign App Bundle
      if: ${{ github.event_name == 'release' }}
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/bundle/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "36.0.0"

    - name: Upload apk artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-apk
        path: app/build/outputs/apk/release/*-signed.apk
        if-no-files-found: error

    - name: Upload bundle artifact
      if: ${{ github.event_name == 'release' }}
      uses: actions/upload-artifact@v4
      with:
        name: signed-bundle
        path: app/build/outputs/bundle/release/*.aab
        if-no-files-found: error

    - name: Release on GitHub
      if: ${{ github.event_name == 'release' }}
      uses: ncipollo/release-action@v1
      with:
        prerelease: true
        omitBody: true
        omitBodyDuringUpdate: true
        omitName: true
        allowUpdates: true
        replacesArtifacts: true
        updateOnlyUnreleased: true
        artifacts: app/build/outputs/apk/release/*-signed.apk,app/build/outputs/bundle/release/*.aab

    - name: Push to Play Store
      if: ${{ github.event_name == 'release' && !contains(github.ref, '-rc') }}
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        packageName: com.github.meypod.al_azan
        releaseFiles: app/build/outputs/bundle/release/*.aab
        track: internal
        status: draft
